name: Backend PR Check

# Required GitHub Secrets:
#   AWS_ROLE_ARN           - GitHub OIDC role ARN (not needed for PR checks, no AWS calls)
#   (none required — this workflow is AWS-free)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/trading-api/**'
      - '.github/workflows/backend-pr-check.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/trading-api/PetsTrading.sln

      - name: Build
        run: dotnet build src/trading-api/PetsTrading.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test src/trading-api/PetsTrading.sln
          --no-build
          --configuration Release
          --logger trx
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: TestResults/
