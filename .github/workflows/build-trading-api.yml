name: Build & Push Trading API

# Builds the Trading API Docker image and pushes it to ECR on every merge to
# main that touches Trading API source or shared project code.
#
# NOTE: Enable this workflow (and disable initial-setup.yml) once infrastructure
# is stable and you want per-component builds decoupled from Terraform.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - GitHub OIDC role ARN
#   AWS_REGION             - e.g., us-east-1
#   PROJECT_NAME           - pets-trading-system

on:
  push:
    branches: [main]
    paths:
      - 'src/trading-api/src/PetsTrading.TradingApi/**'
      - 'src/trading-api/src/PetsTrading.Application/**'
      - 'src/trading-api/src/PetsTrading.Domain/**'
      - 'src/trading-api/src/PetsTrading.Infrastructure/**'
      - 'src/trading-api/src/PetsTrading.TradingApi/Dockerfile'
      - '.github/workflows/build-trading-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  build-and-push:
    name: Build & Push Trading API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildTradingApi-${{ github.run_id }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Trading API image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          # ECR repos are shared across environments — no environment suffix in repo names
          ECR_TRADING_API="${REGISTRY}/${{ env.PROJECT_NAME }}-trading-api"
          docker build \
            -t "${ECR_TRADING_API}:${{ github.sha }}" \
            -t "${ECR_TRADING_API}:latest" \
            -f src/trading-api/src/PetsTrading.TradingApi/Dockerfile \
            src/trading-api/
          docker push "${ECR_TRADING_API}:${{ github.sha }}"
          docker push "${ECR_TRADING_API}:latest"
