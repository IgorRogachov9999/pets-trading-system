name: Post-Merge Build (Disabled — use initial-setup.yml until infra is stable)

# Builds and pushes all container images + frontend artifact on demand.
# Enable this workflow (and disable initial-setup.yml) once infrastructure
# is stable and you want faster per-component builds separate from Terraform.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - GitHub OIDC role ARN
#   AWS_REGION             - e.g., us-east-1
#   PROJECT_NAME           - pts
#   TF_STATE_BUCKET        - S3 bucket for Terraform state
#   TF_STATE_LOCK_TABLE    - DynamoDB table for Terraform state lock

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - demo

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build & push backend container images ─────────────────────────────────
  build-backend:
    name: Build & Push Backend Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildBackend-${{ github.run_id }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR URLs from naming convention
        id: ecr-urls
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          # ECR repos are shared across environments — no environment suffix in repo names
          echo "trading_api=${REGISTRY}/${{ secrets.PROJECT_NAME }}-trading-api" >> $GITHUB_OUTPUT
          echo "lifecycle=${REGISTRY}/${{ secrets.PROJECT_NAME }}-lifecycle-lambda" >> $GITHUB_OUTPUT

      - name: Build & Push Trading API
        run: |
          FULL_URL="${{ steps.ecr-urls.outputs.trading_api }}"
          docker build \
            -t ${FULL_URL}:${{ github.sha }} \
            -t ${FULL_URL}:latest \
            -f src/trading-api/src/PetsTrading.TradingApi/Dockerfile \
            src/trading-api/
          docker push ${FULL_URL}:${{ github.sha }}
          docker push ${FULL_URL}:latest

      - name: Build & Push Lifecycle Lambda
        run: |
          FULL_URL="${{ steps.ecr-urls.outputs.lifecycle }}"
          docker build \
            -t ${FULL_URL}:${{ github.sha }} \
            -t ${FULL_URL}:latest \
            -f src/trading-api/src/lifecycle/PetsTrading.LifecycleLambda/Dockerfile \
            src/trading-api/
          docker push ${FULL_URL}:${{ github.sha }}
          docker push ${FULL_URL}:latest

  # ── Build frontend & upload to builds bucket ─────────────────────────────
  build-frontend:
    name: Build & Upload Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Install & Build
        working-directory: src/ui
        run: npm ci && npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildFrontend-${{ github.run_id }}

      - name: Upload to Builds Bucket (SHA + latest)
        run: |
          BUILDS_BUCKET="${{ secrets.PROJECT_NAME }}-${{ inputs.environment }}-builds"
          aws s3 sync src/ui/dist/ s3://${BUILDS_BUCKET}/frontend/${{ github.sha }}/
          aws s3 sync src/ui/dist/ s3://${BUILDS_BUCKET}/frontend/latest/
