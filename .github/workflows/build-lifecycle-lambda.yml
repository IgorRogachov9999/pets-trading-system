name: Build & Push Lifecycle Lambda

# Builds the Lifecycle Lambda Docker image and pushes it to ECR on every merge
# to main that touches Lambda source or shared project code.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - GitHub OIDC role ARN
#   AWS_REGION             - e.g., us-east-1
#   PROJECT_NAME           - pets-trading-system

on:
  push:
    branches: [main]
    paths:
      - 'src/trading-api/src/lifecycle/**'
      - 'src/trading-api/src/PetsTrading.Application/**'
      - 'src/trading-api/src/PetsTrading.Domain/**'
      - 'src/trading-api/src/PetsTrading.Infrastructure/**'
      - '.github/workflows/build-lifecycle-lambda.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  build-and-push:
    name: Build & Push Lifecycle Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildLifecycleLambda-${{ github.run_id }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Lifecycle Lambda image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          # ECR repos are shared across environments — no environment suffix in repo names
          ECR_LIFECYCLE="${REGISTRY}/${{ env.PROJECT_NAME }}-lifecycle-lambda"
          docker build \
            -t "${ECR_LIFECYCLE}:${{ github.sha }}" \
            -t "${ECR_LIFECYCLE}:latest" \
            -f src/trading-api/src/lifecycle/PetsTrading.LifecycleLambda/Dockerfile \
            src/trading-api/
          docker push "${ECR_LIFECYCLE}:${{ github.sha }}"
          docker push "${ECR_LIFECYCLE}:latest"
