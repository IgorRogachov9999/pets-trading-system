name: Initial Setup (One-Time Bootstrap)

# Full bootstrap pipeline: Terraform apply → build images → build frontend → deploy all.
#
# NOTE: This pipeline runs on every push to main. Once infrastructure is stable,
# disable this workflow and enable post-merge-build.yml + deploy-dev.yml instead.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           - GitHub OIDC role ARN
#   AWS_REGION             - e.g., us-east-1
#   PROJECT_NAME           - pts
#   TF_STATE_BUCKET        - S3 bucket for Terraform state (pre-created manually)
#   TF_STATE_LOCK_TABLE    - DynamoDB table for Terraform state lock (pre-created manually)
#
# Bootstrap prerequisites — run once before triggering this workflow:
#   aws s3api create-bucket --bucket <TF_STATE_BUCKET> --region us-east-1
#   aws s3api put-bucket-versioning --bucket <TF_STATE_BUCKET> \
#     --versioning-configuration Status=Enabled
#   aws s3api put-bucket-encryption --bucket <TF_STATE_BUCKET> \
#     --server-side-encryption-configuration \
#     '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
#   aws dynamodb create-table \
#     --table-name <TF_STATE_LOCK_TABLE> \
#     --attribute-definitions AttributeName=LockID,AttributeType=S \
#     --key-schema AttributeName=LockID,KeyType=HASH \
#     --billing-mode PAY_PER_REQUEST \
#     --region us-east-1

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  ENVIRONMENT: dev

jobs:
  # ── Step 1: Terraform apply (ECR — shared, env-independent) ───────────────
  terraform-ecr:
    name: Terraform Apply (ECR — shared)
    runs-on: ubuntu-latest
    outputs:
      ecr_trading_api_url: ${{ steps.tf-outputs.outputs.ecr_trading_api_url }}
      ecr_lifecycle_url: ${{ steps.tf-outputs.outputs.ecr_lifecycle_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-ECR-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.6'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/ecr
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.PROJECT_NAME }}/ecr/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform/ecr
        run: |
          terraform plan \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        working-directory: terraform/ecr
        run: terraform apply -auto-approve tfplan

      - name: Capture ECR Outputs
        id: tf-outputs
        working-directory: terraform/ecr
        run: |
          echo "ecr_trading_api_url=$(terraform output -raw trading_api_repository_url)" >> $GITHUB_OUTPUT
          echo "ecr_lifecycle_url=$(terraform output -raw lifecycle_lambda_repository_url)" >> $GITHUB_OUTPUT

  # ── Step 2: Terraform apply (dev — env-specific infra) ────────────────────
  terraform-apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    needs: terraform-ecr
    outputs:
      frontend_bucket: ${{ steps.tf-outputs.outputs.frontend_bucket }}
      builds_bucket: ${{ steps.tf-outputs.outputs.builds_bucket }}
      cloudfront_id: ${{ steps.tf-outputs.outputs.cloudfront_id }}
      ecs_cluster: ${{ steps.tf-outputs.outputs.ecs_cluster }}
      ecs_service: ${{ steps.tf-outputs.outputs.ecs_service }}
      lambda_function: ${{ steps.tf-outputs.outputs.lambda_function }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-Bootstrap-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.6'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.PROJECT_NAME }}/${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "builds_bucket=$(terraform output -raw builds_bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT
          echo "lambda_function=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT

  # ── Step 3a: Build & push backend container images ────────────────────────
  build-backend:
    name: Build & Push Backend Images
    runs-on: ubuntu-latest
    needs: [terraform-ecr, terraform-apply]
    env:
      ECR_TRADING_API: ${{ needs.terraform-ecr.outputs.ecr_trading_api_url }}
      ECR_LIFECYCLE: ${{ needs.terraform-ecr.outputs.ecr_lifecycle_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildBackend-${{ github.run_id }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Trading API
        run: |
          docker build \
            -t ${{ env.ECR_TRADING_API }}:${{ github.sha }} \
            -t ${{ env.ECR_TRADING_API }}:latest \
            -f src/trading-api/src/PetsTrading.TradingApi/Dockerfile \
            src/trading-api/
          docker push ${{ env.ECR_TRADING_API }}:${{ github.sha }}
          docker push ${{ env.ECR_TRADING_API }}:latest

      - name: Build & Push Lifecycle Lambda
        run: |
          docker build \
            -t ${{ env.ECR_LIFECYCLE }}:${{ github.sha }} \
            -t ${{ env.ECR_LIFECYCLE }}:latest \
            -f src/trading-api/src/lifecycle/PetsTrading.LifecycleLambda/Dockerfile \
            src/trading-api/
          docker push ${{ env.ECR_LIFECYCLE }}:${{ github.sha }}
          docker push ${{ env.ECR_LIFECYCLE }}:latest

  # ── Step 3b: Build frontend & upload to builds bucket ────────────────────
  build-frontend:
    name: Build & Upload Frontend
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Install
        working-directory: src/ui
        run: npm ci

      - name: Build
        working-directory: src/ui
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-BuildFrontend-${{ github.run_id }}

      - name: Upload to Builds Bucket (SHA + latest)
        run: |
          aws s3 sync src/ui/dist/ \
            s3://${{ needs.terraform-apply.outputs.builds_bucket }}/frontend/${{ github.sha }}/
          aws s3 sync src/ui/dist/ \
            s3://${{ needs.terraform-apply.outputs.builds_bucket }}/frontend/latest/

  # ── Step 4: Deploy all services ───────────────────────────────────────────
  deploy:
    name: Deploy All Services
    runs-on: ubuntu-latest
    needs: [terraform-ecr, terraform-apply, build-backend, build-frontend]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GHActions-Deploy-${{ github.run_id }}

      - name: Deploy Trading API (ECS force-new-deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ needs.terraform-apply.outputs.ecs_cluster }} \
            --service ${{ needs.terraform-apply.outputs.ecs_service }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform-apply.outputs.ecs_cluster }} \
            --services ${{ needs.terraform-apply.outputs.ecs_service }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy Lifecycle Lambda (update image)
        run: |
          aws lambda update-function-code \
            --function-name ${{ needs.terraform-apply.outputs.lambda_function }} \
            --image-uri ${{ needs.terraform-ecr.outputs.ecr_lifecycle_url }}:${{ github.sha }} \
            --region ${{ secrets.AWS_REGION }}
          aws lambda wait function-updated \
            --function-name ${{ needs.terraform-apply.outputs.lambda_function }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend to S3
        run: |
          # Hashed static assets — cache 1 year
          aws s3 sync \
            s3://${{ needs.terraform-apply.outputs.builds_bucket }}/frontend/${{ github.sha }}/ \
            s3://${{ needs.terraform-apply.outputs.frontend_bucket }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          # index.html — never cache
          aws s3 cp \
            s3://${{ needs.terraform-apply.outputs.builds_bucket }}/frontend/${{ github.sha }}/index.html \
            s3://${{ needs.terraform-apply.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform-apply.outputs.cloudfront_id }} \
            --paths "/*"
